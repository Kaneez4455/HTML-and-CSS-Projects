<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }
    h1 {
        font-family: sans-serif;
        text-align: center;
        margin-top: 10%;

    }
    .parent {
        margin-left: 300px;
    }
    button {
        padding: 2% 4.5%;
        margin-top: 10%;
        margin-left: 2%;
        font-size: 15px;
        
        
    }
    #green:hover {
        background-color: rgb(83, 158, 83);
        color: white;
        border: none;
        cursor: pointer;
    }
    #blue:hover {
        background-color: rgb(72, 72, 138);
        color: white;
        border: none;
        cursor: pointer;
    }
    #red:hover {
        background-color: rgb(196, 86, 86);
        color: white;
        border: none;
        cursor: pointer;
    }
    #gray:hover {
        background-color: rgb(168, 148, 148);
        color: black;
        border: none;
        cursor: pointer;
    }
    #black:hover {
        background-color: rgb(59, 53, 53);
        color: white;
        border: none;
        cursor: pointer;
    }
    
</style>
<body>
    <h1>CSS BUTTONS</h1>
    <div class="parent">
        <button id="green">Green</button>
        <button id="blue">Blue</button>
        <button id="red">Red</button>
        <button id="gray">Gray</button>
        <button id="black">Black</button>
    </div>
    
    
</body>
</html>
